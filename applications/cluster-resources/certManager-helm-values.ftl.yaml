<#assign DockerImageParser=statics['com.cloudogu.gitops.utils.DockerImageParser']>
<#if podResources == true>
resources:
  # Be generous to our Single Point of failure
  limits:
     cpu: '1'
     memory: 400Mi
  requests:
    cpu: 30m
    memory: 400Mi
cainjector:
  resources:
    limits:
      cpu: '1'
      memory: 400Mi
    requests:
      cpu: 30m
      memory: 400Mi
webhook:
  resources:
    limits:
      cpu: '1'
      memory: 30Mi
    requests:
      cpu: 20m
      memory: 30Mi
</#if>
<#if skipCRDs != true>
crds:
  enabled: true
</#if>
<#if config.features.certManager.helm.image?has_content>
  <#assign imageObject = DockerImageParser.parse(config.features.certManager.helm.image)>
  image:
    repository: ${imageObject.registryAndRepositoryAsString}
    tag: ${imageObject.tag}
</#if>

