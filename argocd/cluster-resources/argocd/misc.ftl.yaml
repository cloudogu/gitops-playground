# this misc-Application manages all resources in the misc folder in the gitops repository
# use the misc folder to deploy resources, which are needed for multiple other apps such as ServiceAccounts or shared ConfigMaps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: <#if config.multiTenant.centralSCMUrl?has_content>${namePrefix}misc<#else>misc</#if>
spec:
  project: <#if config.multiTenant.centralSCMUrl?has_content>${tenantName}<#else>cluster-resources</#if>
  destination:
    server: https://kubernetes.default.svc
  source:
    path: misc/
<#if config.multiTenant.centralSCMUrl?has_content>
    repoURL: ${scmm.centralScmmUrl}/repo/${namePrefix}argocd/cluster-resources
<#else>
    repoURL: ${scmm.repoUrl}argocd/cluster-resources<#if scmm.provider == "gitlab">.git</#if>
</#if>
    targetRevision: main
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true