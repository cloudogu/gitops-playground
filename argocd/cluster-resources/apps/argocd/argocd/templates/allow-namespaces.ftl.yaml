---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-access-scmm
  namespace: ${config.application.namePrefix}${config.scm.scmManager.namespace}
spec:
  podSelector:
    matchLabels:
      app: scm-manager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ${config.application.namePrefix}${config.features.argocd.namespace}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-repo-server
      ports:
        - protocol: TCP
          port: 8080
