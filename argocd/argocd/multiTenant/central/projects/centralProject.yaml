apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fv24
  namespace: argocd
spec:
  description: Contains Cluster Ressources for MultiTentant Mode
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  sourceRepos:
    - http://scmm-scm-manager.scm-manager.svc.cluster.local/scm/repo/fv24-argocd/argocd
    - http://scmm-scm-manager.scm-manager.svc.cluster.local/scm/repo/fv24-argocd/cluster-resources
    - https://prometheus-community.github.io/helm-charts
    - https://codecentric.github.io/helm-charts
    - https://kubernetes.github.io/ingress-nginx
    - https://helm.releases.hashicorp.com
    - https://charts.external-secrets.io
    - https://charts.jetstack.io
  # allow to only see application resources from the specified namespace
  sourceNamespaces:
    - '*'

  # Allow all namespaced-scoped resources to be created
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Deny all cluster-scoped resources from being created. Least privilege.
  clusterResourceWhitelist: