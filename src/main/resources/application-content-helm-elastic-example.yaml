# $schema: https://raw.githubusercontent.com/cloudogu/gitops-playground/main/docs/configuration.schema.json
application:
  "yes": true
  baseUrl: http://localhost
  insecure: true
  namePrefix: my-prefix
features:
  argocd:
    active: true
  ingress:
    active: true

content:
  helmReleases:
    - name: elasticsearch
      repoURL: https://helm.elastic.co
      chart: elasticsearch
      version: "8.5.1"
      namespace: my-prefix-elasticsearch
      releaseName: elasticsearch
      values:
        replicas: 1

        # Für kleine Demo-Cluster: ohne Security + ohne TLS (nur Demo!)
        esConfig:
          elasticsearch.yml: |
            xpack.security.enabled: false
            xpack.security.http.ssl.enabled: false
            xpack.security.transport.ssl.enabled: false

        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi

        volumeClaimTemplate:
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 10Gi

        service:
          type: NodePort
          nodePort: 30920
          ports:
            - name: http
              port: 9200
registry:
  active: true